<!doctype html>
<!--
  Template hyperframes — chaîne OFM. Copier dans projects/<projet>/hyperframes/<sceneId>/index.html
  puis remplacer le contenu de .stage + la timeline. Garder le contrat #root + window.__timelines.main.
  Charte : navy #05080f, accent #00C8FF, texte blanc, Arial bold, glow bleu. AUCUN asset externe sauf GSAP.
-->
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg: #05080f;
        --bg-glow: #0a1424;
        --accent: #00c8ff;
        --ink: #ffffff;
        --muted: #9fb6c6;
        --dim: #1d3b55;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: var(--bg);
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
      }
      .wrap {
        width: 1920px; height: 1080px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 56px;
        background: radial-gradient(ellipse at 50% 30%, var(--bg-glow) 0%, var(--bg) 70%);
      }
      .kicker {
        font-size: 40px; font-weight: bold; letter-spacing: 14px; color: var(--accent);
        text-transform: uppercase;
      }
      .headline { font-size: 84px; font-weight: bold; text-align: center; line-height: 1.05; }
      .big-number {
        font-size: 200px; font-weight: bold; line-height: 1;
        text-shadow: 0 0 60px rgba(0, 200, 255, 0.45);
      }
      .accent { color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="8"
         data-width="1920" data-height="1080">
      <div class="wrap">
        <!-- STAGE : remplacer par le contenu de la scène -->
        <div class="kicker">KICKER</div>
        <div class="big-number">0</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // … animations de la scène …
      tl.from(".kicker", { opacity: 0, y: -40, duration: 0.6, ease: "power2.out" }, 0.2);
      tl.from(".big-number", { opacity: 0, scale: 0.85, duration: 0.5, ease: "power2.out" }, 0.5);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
